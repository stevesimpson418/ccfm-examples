stages:
  - lint
  - plan
  - deploy

# ---------------------------------------------------------------------------
# Idempotent setup of ccfm management pages.
# All plan and deploy jobs inherit this via `extends`.
# ---------------------------------------------------------------------------
.ccfm-init:
  before_script:
    - ccfm --config ccfm.yaml init

# ---------------------------------------------------------------------------
# lint:markdown
# ---------------------------------------------------------------------------
lint:markdown:
  stage: lint
  image: node:20-alpine
  before_script:
    - npm install -g markdownlint-cli2
  script:
    - markdownlint-cli2 "docs/**/*.md"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - docs/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/**/*

# ---------------------------------------------------------------------------
# plan:confluence
# Informational plan check on MRs (exits 0 since v0.2.0).
# ---------------------------------------------------------------------------
plan:confluence:
  stage: plan
  image: ghcr.io/stevesimpson418/ccfm-convert:latest
  extends: .ccfm-init
  needs:
    - lint:markdown
  script:
    - ccfm --config ccfm.yaml deploy --directory docs --plan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - docs/**/*

# ---------------------------------------------------------------------------
# deploy:confluence
# Deploys on push to the default branch when docs change.
# ---------------------------------------------------------------------------
deploy:confluence:
  stage: deploy
  image: ghcr.io/stevesimpson418/ccfm-convert:latest
  extends: .ccfm-init
  needs:
    - lint:markdown
  script:
    - ccfm --config ccfm.yaml deploy --directory docs --changed-only --archive-orphans
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/**/*
