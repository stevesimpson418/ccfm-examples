stages:
  - lint
  - plan
  - apply

# ---------------------------------------------------------------------------
# Idempotent setup of ccfm management page.
# All plan and apply jobs inherit this via `extends`.
# ---------------------------------------------------------------------------
.ccfm-init:
  before_script:
    - ccfm init

# ---------------------------------------------------------------------------
# lint:markdown
# ---------------------------------------------------------------------------
lint:markdown:
  stage: lint
  image: node:20-alpine
  before_script:
    - npm install -g markdownlint-cli2
  script:
    - markdownlint-cli2 "docs/**/*.md"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - docs/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/**/*

# ---------------------------------------------------------------------------
# plan:confluence
# Informational plan check on MRs.
# ---------------------------------------------------------------------------
plan:confluence:
  stage: plan
  image: ghcr.io/stevesimpson418/ccfm-convert:latest
  extends: .ccfm-init
  needs:
    - lint:markdown
  script:
    - ccfm plan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - docs/**/*

# ---------------------------------------------------------------------------
# apply:confluence
# Applies changes on push to the default branch when docs change.
# ---------------------------------------------------------------------------
apply:confluence:
  stage: apply
  image: ghcr.io/stevesimpson418/ccfm-convert:latest
  extends: .ccfm-init
  needs:
    - lint:markdown
  script:
    - ccfm apply --auto-approve
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/**/*
