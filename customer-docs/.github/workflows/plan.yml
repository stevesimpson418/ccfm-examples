name: Plan Docs (PR Check)

on:
  pull_request:
    paths:
      - 'docs/**'

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ccfm-convert
        run: pip install "ccfm-convert>=0.3.0"

      - name: Run plan
        env:
          CONFLUENCE_DOMAIN: ${{ secrets.CONFLUENCE_DOMAIN }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
        run: |
          ccfm --config ccfm.yaml --directory docs --plan || true
        # Since v0.2.0, --plan exits 0 by default — this check is informational.
        # Remove "|| true" if you want this check to fail on errors other than pending changes.
