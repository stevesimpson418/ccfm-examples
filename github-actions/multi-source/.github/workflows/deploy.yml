name: Docs — Multi-Source Deploy

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'docs-wiki/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'docs-wiki/**'

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Plan API docs
        uses: stevesimpson418/ccfm-convert@v0.3.0
        with:
          domain: ${{ secrets.CONFLUENCE_DOMAIN }}
          email: ${{ secrets.CONFLUENCE_EMAIL }}
          token: ${{ secrets.CONFLUENCE_TOKEN }}
          space: ENG
          directory: docs
          version: "0.3.0"
          args: "--plan"

      - name: Plan wiki docs
        uses: stevesimpson418/ccfm-convert@v0.3.0
        with:
          domain: ${{ secrets.CONFLUENCE_DOMAIN }}
          email: ${{ secrets.CONFLUENCE_EMAIL }}
          token: ${{ secrets.CONFLUENCE_TOKEN }}
          space: WIKI
          directory: docs-wiki
          version: "0.3.0"
          args: "--plan"

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy API docs
        uses: stevesimpson418/ccfm-convert@v0.3.0
        with:
          domain: ${{ secrets.CONFLUENCE_DOMAIN }}
          email: ${{ secrets.CONFLUENCE_EMAIL }}
          token: ${{ secrets.CONFLUENCE_TOKEN }}
          space: ENG
          directory: docs
          version: "0.3.0"
          args: "--changed-only --archive-orphans --git-repo-url https://github.com/${{ github.repository }}/blob/main"

      - name: Deploy wiki docs
        uses: stevesimpson418/ccfm-convert@v0.3.0
        with:
          domain: ${{ secrets.CONFLUENCE_DOMAIN }}
          email: ${{ secrets.CONFLUENCE_EMAIL }}
          token: ${{ secrets.CONFLUENCE_TOKEN }}
          space: WIKI
          directory: docs-wiki
          version: "0.3.0"
          args: "--changed-only --archive-orphans --git-repo-url https://github.com/${{ github.repository }}/blob/main"
