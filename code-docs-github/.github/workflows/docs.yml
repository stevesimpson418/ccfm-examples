name: Docs — Plan & Deploy

on:
  pull_request:
    paths:
      - 'docs/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Plan docs changes
        uses: stevesimpson418/ccfm-convert@v0.3.0
        with:
          domain: ${{ secrets.CONFLUENCE_DOMAIN }}
          email: ${{ secrets.CONFLUENCE_EMAIL }}
          token: ${{ secrets.CONFLUENCE_TOKEN }}
          space: ENG
          directory: docs
          version: "0.3.0"
          args: "--plan"
        # Since v0.2.0, --plan exits 0 by default — this check is informational.

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy docs to Confluence
        uses: stevesimpson418/ccfm-convert@v0.3.0
        with:
          domain: ${{ secrets.CONFLUENCE_DOMAIN }}
          email: ${{ secrets.CONFLUENCE_EMAIL }}
          token: ${{ secrets.CONFLUENCE_TOKEN }}
          space: ENG
          directory: docs
          version: "0.3.0"
          args: "--archive-orphans --git-repo-url https://github.com/${{ github.repository }}/blob/main"
