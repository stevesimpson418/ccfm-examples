name: Deploy Wiki to Confluence

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy docs to Confluence
        uses: stevesimpson418/ccfm-convert@v0.3.0
        with:
          domain: ${{ secrets.CONFLUENCE_DOMAIN }}
          email: ${{ secrets.CONFLUENCE_EMAIL }}
          token: ${{ secrets.CONFLUENCE_TOKEN }}
          space: WIKI
          directory: docs
          version: "0.3.0"
          args: "--changed-only --archive-orphans --git-repo-url https://github.com/${{ github.repository }}/blob/main"
